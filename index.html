<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Landing Page</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f1e8;
      color: #222;
      margin: 0;
      padding: 0;
      text-align: center;
    }
    .hero {
      padding: 100px 20px;
      background: #d9c7a3;
    }
    h1 {
      font-size: 48px;
      margin-bottom: 10px;
    }
    p {
      font-size: 20px;
      max-width: 700px;
      margin: 0 auto 20px;
    }
    a.button {
      display: inline-block;
      padding: 14px 22px;
      background: #222;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      margin-top: 15px;
    }
  </style>
</head>
<body>
  <div class="hero">
    <h1>Welcome</h1>
    <p>This is my simple landing page.</p>
    <a class="button" href="mailto:you@example.com">Contact Me</a>
  </div>
</body>
</html>
